version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      # Excluded rules and rationale:
      #   G104 — unhandled errors; overlaps with errcheck.
      #   G204 — subprocess with variable args; unavoidable for a CLI that
      #          shells out to `gh`, `open`, `xdg-open`, etc.
      #   G301/G302/G306 — file/dir permissions; this is a user-facing CLI
      #          that writes config + PR lists under $HOME, where 0o644/0o755
      #          is the expected default. A hardening pass (separate work) can
      #          tighten these.
      #   G304 — file path from variable; unavoidable for a CLI that reads
      #          user-supplied config paths.
      excludes:
        - G104
        - G204
        - G301
        - G302
        - G304
        - G306

formatters:
  enable:
    - gofmt
    - goimports
