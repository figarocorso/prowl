version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      # Excluded rules and rationale:
      #   G104 — unhandled errors; overlaps with errcheck.
      #   G204 — subprocess with variable args; unavoidable for a CLI that
      #          shells out to `gh`, `open`, `xdg-open`, etc. with URL args.
      #   G304 — file path from variable; unavoidable for a CLI that reads
      #          user-supplied config paths.
      # G301/G302/G306 were excluded historically when prowl wrote with
      # 0o644/0o755 perms. Files/dirs are now owner-only (0o600/0o700), so
      # the rules are re-enabled to keep us honest.
      excludes:
        - G104
        - G204
        - G304

formatters:
  enable:
    - gofmt
    - goimports
