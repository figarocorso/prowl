name: 🐛 Bug report
description: Report a defect in prowl
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include the output of
        `prowl version` and `prowl check` so we can reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `prowl add …`
        2. Run `prowl list`
        3. …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Paste `prowl version` and `prowl check` output here.
      render: shell
    validations:
      required: true
